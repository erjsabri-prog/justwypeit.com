<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>wype® Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Rajdhani:wght@600;700&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --red: #E01E1E;
  --red-dark: #b01010;
  --bg: #0d0d0d;
  --surface: #161616;
  --surface2: #1e1e1e;
  --border: rgba(255,255,255,0.08);
  --text: #f0f0f0;
  --muted: rgba(255,255,255,0.4);
  --green: #22c55e;
  --amber: #f59e0b;
  --blue: #3b82f6;
}
body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; min-height: 100vh; }

/* ── Login ── */
#loginScreen {
  min-height: 100vh; display: flex; align-items: center; justify-content: center;
  background: radial-gradient(ellipse at 50% 0%, rgba(224,30,30,0.12) 0%, transparent 60%);
}
.login-card {
  background: var(--surface); border: 1px solid var(--border); border-radius: 20px;
  padding: 48px 40px; width: 100%; max-width: 400px;
  box-shadow: 0 32px 80px rgba(0,0,0,0.6);
}
.login-logo {
  font-family: 'Rajdhani', sans-serif; font-size: 36px; font-weight: 700;
  color: #fff; letter-spacing: 3px; text-align: center; margin-bottom: 6px;
}
.login-logo span { color: var(--red); }
.login-sub { text-align: center; font-size: 12px; color: var(--muted); letter-spacing: 2px; text-transform: uppercase; margin-bottom: 36px; }
.field { margin-bottom: 16px; }
.field label { display: block; font-size: 11px; font-weight: 600; letter-spacing: 1.5px; text-transform: uppercase; color: var(--muted); margin-bottom: 8px; }
.field input {
  width: 100%; background: var(--surface2); border: 1px solid var(--border); border-radius: 10px;
  padding: 14px 16px; font-size: 15px; color: var(--text); font-family: inherit; outline: none;
  transition: border-color 0.2s;
}
.field input:focus { border-color: var(--red); }
.btn-login {
  width: 100%; background: var(--red); color: #fff; border: none; border-radius: 10px;
  padding: 15px; font-size: 15px; font-weight: 700; font-family: inherit; cursor: pointer;
  letter-spacing: 0.5px; margin-top: 8px; transition: background 0.2s;
}
.btn-login:hover { background: var(--red-dark); }
#loginError { color: #ff6b6b; font-size: 13px; text-align: center; margin-top: 12px; display: none; }

/* ── Dashboard ── */
#dashboard { display: none; }
.admin-header {
  position: sticky; top: 0; z-index: 100;
  background: rgba(13,13,13,0.9); backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--border); padding: 0 32px;
  display: flex; align-items: center; justify-content: space-between; height: 60px;
}
.header-logo { font-family: 'Rajdhani', sans-serif; font-size: 22px; font-weight: 700; letter-spacing: 2px; }
.header-logo span { color: var(--red); }
.header-right { display: flex; align-items: center; gap: 16px; }
.header-badge { font-size: 11px; color: var(--muted); background: var(--surface); border: 1px solid var(--border); border-radius: 20px; padding: 4px 12px; }
.btn-logout { background: none; border: 1px solid var(--border); color: var(--muted); border-radius: 8px; padding: 6px 14px; font-size: 12px; font-family: inherit; cursor: pointer; transition: all 0.2s; }
.btn-logout:hover { border-color: var(--red); color: var(--red); }

.admin-body { max-width: 1100px; margin: 0 auto; padding: 32px 24px 80px; }

/* Stats row */
.stats-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 32px; }
.stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 20px 24px; }
.stat-label { font-size: 11px; font-weight: 600; letter-spacing: 1.5px; text-transform: uppercase; color: var(--muted); margin-bottom: 8px; }
.stat-value { font-size: 28px; font-weight: 700; color: var(--text); }
.stat-value.red { color: var(--red); }
.stat-value.green { color: var(--green); }
.stat-value.amber { color: var(--amber); }

/* Controls */
.controls { display: flex; align-items: center; gap: 12px; margin-bottom: 20px; flex-wrap: wrap; }
.search-wrap { position: relative; flex: 1; min-width: 200px; }
.search-wrap input {
  width: 100%; background: var(--surface); border: 1px solid var(--border); border-radius: 10px;
  padding: 10px 16px 10px 40px; font-size: 14px; color: var(--text); font-family: inherit; outline: none;
  transition: border-color 0.2s;
}
.search-wrap input:focus { border-color: var(--red); }
.search-icon { position: absolute; left: 13px; top: 50%; transform: translateY(-50%); color: var(--muted); pointer-events: none; }
.filter-tabs { display: flex; gap: 6px; }
.tab {
  background: var(--surface); border: 1px solid var(--border); border-radius: 8px;
  padding: 8px 16px; font-size: 13px; font-weight: 500; color: var(--muted);
  cursor: pointer; transition: all 0.2s; font-family: inherit;
}
.tab.active, .tab:hover { background: var(--red); border-color: var(--red); color: #fff; }
.refresh-btn {
  background: var(--surface); border: 1px solid var(--border); border-radius: 8px;
  padding: 8px 16px; font-size: 13px; color: var(--muted); cursor: pointer; font-family: inherit;
  transition: all 0.2s;
}
.refresh-btn:hover { border-color: var(--red); color: var(--red); }

/* Order list */
#orderList { display: flex; flex-direction: column; gap: 12px; }

.order-card {
  background: var(--surface); border: 1px solid var(--border); border-radius: 16px;
  overflow: hidden; transition: border-color 0.2s;
}
.order-card:hover { border-color: rgba(224,30,30,0.3); }
.order-card.expanded { border-color: rgba(224,30,30,0.5); }

.order-header {
  display: flex; align-items: center; gap: 16px; padding: 18px 24px; cursor: pointer;
  user-select: none;
}
.order-num { font-family: 'Rajdhani', sans-serif; font-size: 20px; font-weight: 700; color: var(--red); min-width: 60px; }
.order-customer { flex: 1; }
.order-customer-name { font-size: 15px; font-weight: 600; color: var(--text); }
.order-customer-email { font-size: 12px; color: var(--muted); margin-top: 2px; }
.order-total { font-size: 16px; font-weight: 700; color: var(--text); min-width: 70px; text-align: right; }
.order-date { font-size: 12px; color: var(--muted); min-width: 90px; text-align: right; }
.status-badge {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 5px 12px; border-radius: 20px; font-size: 11px; font-weight: 700;
  letter-spacing: 0.8px; text-transform: uppercase;
}
.status-badge.Processing  { background: rgba(245,158,11,0.15); color: var(--amber); border: 1px solid rgba(245,158,11,0.3); }
.status-badge.Dispatched  { background: rgba(59,130,246,0.15); color: var(--blue);  border: 1px solid rgba(59,130,246,0.3); }
.status-badge.Delivered   { background: rgba(34,197,94,0.15);  color: var(--green); border: 1px solid rgba(34,197,94,0.3); }
.status-badge.Cancelled   { background: rgba(255,255,255,0.05); color: var(--muted); border: 1px solid var(--border); }
.status-dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; }
.chevron { color: var(--muted); transition: transform 0.25s; margin-left: 8px; flex-shrink: 0; }
.order-card.expanded .chevron { transform: rotate(180deg); }

/* Order detail */
.order-detail { display: none; border-top: 1px solid var(--border); padding: 24px 24px 28px; }
.order-card.expanded .order-detail { display: block; }

.detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; margin-bottom: 24px; }
.detail-section h4 { font-size: 11px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; color: var(--red); margin-bottom: 12px; }
.detail-row { display: flex; gap: 12px; margin-bottom: 6px; font-size: 14px; }
.detail-label { color: var(--muted); min-width: 90px; flex-shrink: 0; }
.detail-val { color: var(--text); }

.items-list { background: var(--surface2); border-radius: 10px; padding: 14px 16px; margin-bottom: 24px; }
.items-list .item-row { font-size: 14px; color: var(--text); padding: 6px 0; border-bottom: 1px solid var(--border); }
.items-list .item-row:last-child { border-bottom: none; }

/* Dispatch form */
.dispatch-form {
  background: var(--surface2); border: 1px solid rgba(224,30,30,0.2);
  border-radius: 12px; padding: 20px 24px;
}
.dispatch-form h4 { font-size: 13px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; color: var(--red); margin-bottom: 16px; }
.dispatch-row { display: flex; gap: 12px; align-items: flex-end; flex-wrap: wrap; }
.dispatch-field { flex: 1; min-width: 160px; }
.dispatch-field label { display: block; font-size: 11px; font-weight: 600; letter-spacing: 1px; text-transform: uppercase; color: var(--muted); margin-bottom: 6px; }
.dispatch-field input, .dispatch-field select {
  width: 100%; background: var(--surface); border: 1px solid var(--border); border-radius: 8px;
  padding: 10px 14px; font-size: 14px; color: var(--text); font-family: inherit; outline: none;
  transition: border-color 0.2s;
}
.dispatch-field input:focus, .dispatch-field select:focus { border-color: var(--red); }
.dispatch-field select option { background: var(--surface2); }
.btn-dispatch {
  background: var(--red); color: #fff; border: none; border-radius: 8px;
  padding: 10px 22px; font-size: 14px; font-weight: 700; font-family: inherit;
  cursor: pointer; transition: background 0.2s; white-space: nowrap;
}
.btn-dispatch:hover { background: var(--red-dark); }
.btn-dispatch:disabled { opacity: 0.5; cursor: not-allowed; }

.status-row { display: flex; align-items: center; gap: 10px; margin-top: 14px; flex-wrap: wrap; }
.status-row label { font-size: 12px; color: var(--muted); font-weight: 600; letter-spacing: 1px; text-transform: uppercase; }
.status-row select {
  background: var(--surface); border: 1px solid var(--border); border-radius: 8px;
  padding: 8px 12px; font-size: 13px; color: var(--text); font-family: inherit; outline: none; cursor: pointer;
}
.btn-update-status {
  background: var(--surface2); border: 1px solid var(--border); color: var(--text);
  border-radius: 8px; padding: 8px 16px; font-size: 13px; font-weight: 600;
  font-family: inherit; cursor: pointer; transition: all 0.2s;
}
.btn-update-status:hover { border-color: var(--red); color: var(--red); }

.dispatch-msg { font-size: 13px; margin-top: 10px; }
.dispatch-msg.ok { color: var(--green); }
.dispatch-msg.err { color: #ff6b6b; }

.tracking-display {
  background: rgba(59,130,246,0.1); border: 1px solid rgba(59,130,246,0.3);
  border-radius: 8px; padding: 12px 16px; margin-bottom: 16px;
  display: flex; align-items: center; gap: 12px;
}
.tracking-display .t-label { font-size: 11px; color: var(--blue); font-weight: 700; letter-spacing: 1px; text-transform: uppercase; }
.tracking-display .t-number { font-size: 16px; font-weight: 700; color: var(--text); letter-spacing: 1px; }

#emptyState { text-align: center; padding: 60px 20px; color: var(--muted); }
#loadingState { text-align: center; padding: 60px 20px; color: var(--muted); }

@media (max-width: 700px) {
  .stats-row { grid-template-columns: repeat(2, 1fr); }
  .detail-grid { grid-template-columns: 1fr; }
  .order-date { display: none; }
  .dispatch-row { flex-direction: column; }
}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="loginScreen">
  <div class="login-card">
    <div class="login-logo">wype<span>®</span></div>
    <div class="login-sub">Admin Portal</div>
    <form id="loginForm">
      <div class="field">
        <label>Email</label>
        <input type="email" id="loginEmail" value="customer@justwypeit.com" autocomplete="email">
      </div>
      <div class="field">
        <label>Password</label>
        <input type="password" id="loginPassword" autocomplete="current-password" placeholder="Admin password">
      </div>
      <button type="submit" class="btn-login">Sign In</button>
      <div id="loginError">Invalid credentials. Please try again.</div>
    </form>
  </div>
</div>

<!-- DASHBOARD -->
<div id="dashboard">
  <header class="admin-header">
    <div class="header-logo">wype<span>®</span> Admin</div>
    <div class="header-right">
      <div class="header-badge">customer@justwypeit.com</div>
      <button class="btn-logout" onclick="logout()">Sign Out</button>
    </div>
  </header>

  <div class="admin-body">

    <!-- Stats -->
    <div class="stats-row">
      <div class="stat-card">
        <div class="stat-label">Total Orders</div>
        <div class="stat-value" id="statTotal">—</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Processing</div>
        <div class="stat-value amber" id="statProcessing">—</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Dispatched</div>
        <div class="stat-value" style="color:var(--blue)" id="statDispatched">—</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Revenue</div>
        <div class="stat-value red" id="statRevenue">—</div>
      </div>
    </div>

    <!-- Controls -->
    <div class="controls">
      <div class="search-wrap">
        <svg class="search-icon" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        <input type="text" id="searchInput" placeholder="Search order #, name, email…" oninput="renderOrders()">
      </div>
      <div class="filter-tabs">
        <button class="tab active" onclick="setFilter('all', this)">All</button>
        <button class="tab" onclick="setFilter('Processing', this)">Processing</button>
        <button class="tab" onclick="setFilter('Dispatched', this)">Dispatched</button>
        <button class="tab" onclick="setFilter('Delivered', this)">Delivered</button>
      </div>
      <button class="refresh-btn" onclick="loadOrders()">↻ Refresh</button>
    </div>

    <!-- Order list -->
    <div id="loadingState">Loading orders…</div>
    <div id="emptyState" style="display:none">No orders found.</div>
    <div id="orderList"></div>

  </div>
</div>

<script>
const API = '';
let TOKEN  = localStorage.getItem('wype_admin_token') || '';
let ORDERS = [];
let FILTER = 'all';

/* ── Auth ── */
document.getElementById('loginForm').addEventListener('submit', async function(e) {
  e.preventDefault();
  const email = document.getElementById('loginEmail').value.trim();
  const pw    = document.getElementById('loginPassword').value;
  const btn   = document.querySelector('.btn-login');
  btn.textContent = 'Signing in…'; btn.disabled = true;
  try {
    const r = await fetch('/api/admin/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password: pw }),
    });
    const d = await r.json();
    if (!r.ok) throw new Error(d.error || 'Login failed');
    TOKEN = d.token;
    localStorage.setItem('wype_admin_token', TOKEN);
    showDashboard();
  } catch (err) {
    document.getElementById('loginError').textContent = err.message;
    document.getElementById('loginError').style.display = 'block';
  } finally {
    btn.textContent = 'Sign In'; btn.disabled = false;
  }
});

function logout() {
  localStorage.removeItem('wype_admin_token');
  TOKEN = '';
  document.getElementById('dashboard').style.display = 'none';
  document.getElementById('loginScreen').style.display = 'flex';
}

function showDashboard() {
  document.getElementById('loginScreen').style.display = 'none';
  document.getElementById('dashboard').style.display = 'block';
  loadOrders();
}

/* ── Orders ── */
async function loadOrders() {
  document.getElementById('loadingState').style.display = 'block';
  document.getElementById('orderList').innerHTML = '';
  document.getElementById('emptyState').style.display = 'none';
  try {
    const r = await fetch('/api/admin/orders', { headers: { Authorization: 'Bearer ' + TOKEN } });
    if (r.status === 401) { logout(); return; }
    const d = await r.json();
    ORDERS = d.orders || [];
    updateStats();
    renderOrders();
  } catch (err) {
    document.getElementById('loadingState').textContent = 'Failed to load orders.';
  }
}

function updateStats() {
  document.getElementById('statTotal').textContent = ORDERS.length;
  document.getElementById('statProcessing').textContent = ORDERS.filter(o => o.status === 'Processing').length;
  document.getElementById('statDispatched').textContent = ORDERS.filter(o => o.status === 'Dispatched').length;
  const rev = ORDERS.reduce((s, o) => s + parseFloat(o.total || 0), 0);
  document.getElementById('statRevenue').textContent = '£' + rev.toFixed(2);
}

function setFilter(f, btn) {
  FILTER = f;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  renderOrders();
}

function renderOrders() {
  const q = (document.getElementById('searchInput').value || '').toLowerCase();
  let list = ORDERS.filter(o => {
    if (FILTER !== 'all' && o.status !== FILTER) return false;
    if (!q) return true;
    return (o.order_number + ' ' + o.first_name + ' ' + o.last_name + ' ' + o.email).toLowerCase().includes(q);
  });

  document.getElementById('loadingState').style.display = 'none';
  const container = document.getElementById('orderList');
  container.innerHTML = '';

  if (!list.length) { document.getElementById('emptyState').style.display = 'block'; return; }
  document.getElementById('emptyState').style.display = 'none';

  list.forEach(order => container.appendChild(buildCard(order)));
}

function fmtDate(iso) {
  return new Date(iso).toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' });
}

function buildCard(order) {
  const items = Array.isArray(order.items) ? order.items : JSON.parse(order.items || '[]');
  const addr  = [order.address1, order.address2, order.city, order.postcode].filter(Boolean).join(', ');
  const alreadyDispatched = order.status === 'Dispatched' || order.status === 'Delivered';

  const card = document.createElement('div');
  card.className = 'order-card';
  card.dataset.id = order.id;

  card.innerHTML = `
    <div class="order-header" onclick="toggleCard(this)">
      <div class="order-num">#${order.order_number}</div>
      <div class="order-customer">
        <div class="order-customer-name">${order.first_name} ${order.last_name}</div>
        <div class="order-customer-email">${order.email}</div>
      </div>
      <div class="status-badge ${order.status}"><span class="status-dot"></span>${order.status}</div>
      <div class="order-total">£${parseFloat(order.total).toFixed(2)}</div>
      <div class="order-date">${fmtDate(order.created_at)}</div>
      <svg class="chevron" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="m6 9 6 6 6-6"/></svg>
    </div>

    <div class="order-detail">
      <div class="detail-grid">
        <div class="detail-section">
          <h4>Customer</h4>
          <div class="detail-row"><span class="detail-label">Name</span><span class="detail-val">${order.first_name} ${order.last_name}</span></div>
          <div class="detail-row"><span class="detail-label">Email</span><span class="detail-val"><a href="mailto:${order.email}" style="color:var(--red);text-decoration:none">${order.email}</a></span></div>
          ${order.phone ? `<div class="detail-row"><span class="detail-label">Phone</span><span class="detail-val">${order.phone}</span></div>` : ''}
        </div>
        <div class="detail-section">
          <h4>Delivery Address</h4>
          <div class="detail-row"><span class="detail-label">Address</span><span class="detail-val">${addr}</span></div>
          ${order.notes ? `<div class="detail-row"><span class="detail-label">Notes</span><span class="detail-val">${order.notes}</span></div>` : ''}
        </div>
      </div>

      <div class="detail-section" style="margin-bottom:16px">
        <h4>Order Items</h4>
        <div class="items-list">
          ${items.map(i => `<div class="item-row">${i}</div>`).join('')}
        </div>
        <div style="display:flex;justify-content:space-between;font-size:14px;color:var(--muted);margin-bottom:4px">
          <span>Subtotal</span><span>£${parseFloat(order.subtotal||0).toFixed(2)}</span>
        </div>
        <div style="display:flex;justify-content:space-between;font-size:14px;color:var(--muted);margin-bottom:8px">
          <span>Delivery</span><span>${parseFloat(order.delivery||0) === 0 ? 'FREE' : '£'+parseFloat(order.delivery).toFixed(2)}</span>
        </div>
        <div style="display:flex;justify-content:space-between;font-size:16px;font-weight:700;border-top:1px solid var(--border);padding-top:10px">
          <span>Total</span><span style="color:var(--red)">£${parseFloat(order.total||0).toFixed(2)}</span>
        </div>
      </div>

      ${alreadyDispatched && order.tracking_number ? `
      <div class="tracking-display">
        <div>
          <div class="t-label">Tracking Number</div>
          <div class="t-number">${order.tracking_number}</div>
        </div>
        <a href="https://www.royalmail.com/track-your-item#/tracking-results/${order.tracking_number}"
           target="_blank" style="margin-left:auto;background:var(--blue);color:#fff;text-decoration:none;padding:8px 16px;border-radius:8px;font-size:12px;font-weight:700">
          Track →
        </a>
      </div>` : ''}

      <div class="dispatch-form">
        <h4>${alreadyDispatched ? 'Update Dispatch' : 'Mark as Dispatched'}</h4>
        <div class="dispatch-row">
          <div class="dispatch-field">
            <label>Tracking Number</label>
            <input type="text" class="tracking-input" placeholder="e.g. TT123456789GB" value="${order.tracking_number || ''}">
          </div>
          <div class="dispatch-field" style="max-width:180px">
            <label>Carrier</label>
            <select class="carrier-select">
              <option value="Royal Mail">Royal Mail</option>
              <option value="Parcelforce">Parcelforce</option>
              <option value="DPD">DPD</option>
              <option value="Evri">Evri</option>
              <option value="DHL">DHL</option>
            </select>
          </div>
          <button class="btn-dispatch" onclick="dispatch('${order.id}', this)">
            🚚 ${alreadyDispatched ? 'Update & Resend' : 'Dispatch & Email Customer'}
          </button>
        </div>
        <div class="status-row">
          <label>Status</label>
          <select class="status-select">
            <option value="Processing"  ${order.status==='Processing' ?'selected':''}>Processing</option>
            <option value="Dispatched"  ${order.status==='Dispatched' ?'selected':''}>Dispatched</option>
            <option value="Delivered"   ${order.status==='Delivered'  ?'selected':''}>Delivered</option>
            <option value="Cancelled"   ${order.status==='Cancelled'  ?'selected':''}>Cancelled</option>
          </select>
          <button class="btn-update-status" onclick="updateStatus('${order.id}', this)">Update Status</button>
        </div>
        <div class="dispatch-msg" id="msg-${order.id}"></div>
      </div>
    </div>
  `;
  return card;
}

function toggleCard(header) {
  const card = header.closest('.order-card');
  card.classList.toggle('expanded');
}

async function dispatch(orderId, btn) {
  const card    = btn.closest('.order-card');
  const tracking = card.querySelector('.tracking-input').value.trim();
  const carrier  = card.querySelector('.carrier-select').value;
  const msgEl    = document.getElementById('msg-' + orderId);

  if (!tracking) { msgEl.textContent = 'Enter a tracking number.'; msgEl.className = 'dispatch-msg err'; return; }

  btn.disabled = true; btn.textContent = 'Sending…';
  try {
    const r = await fetch('/api/admin/orders/' + orderId + '/dispatch', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', Authorization: 'Bearer ' + TOKEN },
      body: JSON.stringify({ trackingNumber: tracking, carrier }),
    });
    const d = await r.json();
    if (!r.ok) throw new Error(d.error || 'Failed');
    msgEl.textContent = '✓ Dispatched — shipping email sent to customer.';
    msgEl.className = 'dispatch-msg ok';
    // Update local order + re-render card
    const idx = ORDERS.findIndex(o => o.id === orderId);
    if (idx > -1) { ORDERS[idx].status = 'Dispatched'; ORDERS[idx].tracking_number = tracking; }
    updateStats();
    const newCard = buildCard(ORDERS[idx]);
    newCard.classList.add('expanded');
    card.replaceWith(newCard);
    document.getElementById('msg-' + orderId).textContent = '✓ Dispatched — shipping email sent to customer.';
    document.getElementById('msg-' + orderId).className = 'dispatch-msg ok';
  } catch (err) {
    msgEl.textContent = '✗ ' + err.message;
    msgEl.className = 'dispatch-msg err';
    btn.disabled = false; btn.textContent = '🚚 Dispatch & Email Customer';
  }
}

async function updateStatus(orderId, btn) {
  const card   = btn.closest('.order-card');
  const status = card.querySelector('.status-select').value;
  const msgEl  = document.getElementById('msg-' + orderId);
  btn.disabled = true; btn.textContent = 'Updating…';
  try {
    const r = await fetch('/api/admin/orders/' + orderId + '/status', {
      method: 'PATCH',
      headers: { 'Content-Type': 'application/json', Authorization: 'Bearer ' + TOKEN },
      body: JSON.stringify({ status }),
    });
    if (!r.ok) throw new Error((await r.json()).error || 'Failed');
    const idx = ORDERS.findIndex(o => o.id === orderId);
    if (idx > -1) ORDERS[idx].status = status;
    updateStats();
    const newCard = buildCard(ORDERS[idx]);
    newCard.classList.add('expanded');
    card.replaceWith(newCard);
    document.getElementById('msg-' + orderId).textContent = '✓ Status updated to ' + status;
    document.getElementById('msg-' + orderId).className = 'dispatch-msg ok';
  } catch (err) {
    msgEl.textContent = '✗ ' + err.message;
    msgEl.className = 'dispatch-msg err';
    btn.disabled = false; btn.textContent = 'Update Status';
  }
}

/* ── Init ── */
if (TOKEN) {
  showDashboard();
}
</script>
</body>
</html>
